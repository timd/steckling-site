  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

url(\"5c236734-a197-4a83-ba89-21198957612d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"04ffde0e-94c2-4ef7-a47b-ea56152c4415\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"41dd6cb8-3140-4178-8bde-f3ba84ab3656\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"1f424bc6-e11e-4eca-b839-3b77e2770658\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"1c3f0501-e8a1-4108-8a7d-2327db291eb5\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"639b07a1-20a1-4fa6-bab4-11bba469529e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"0c616cc2-2e55-4f03-b87c-004dc29e8a03\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\nbody{margin:0;background:#fdfdfb;font-family:Helvetica,Arial,system-ui,sans-serif;color:#14201a}\na{color:#1c5c3a;text-decoration:none}a:hover{color:#2f9e5f}\n@media (max-width:768px){\n[data-mq~=\"m-hide\"]{display:none !important}\n[data-mq~=\"topbar\"]{padding:12px 16px !important}\n[data-mq~=\"searchbox\"]{width:auto !important;flex:1;max-width:180px}\n[data-mq~=\"docswrap\"]{flex-direction:column !important}\n[data-mq~=\"sidebar\"]{width:auto !important;border-right:none !important;border-bottom:1px solid #ebe9e2;flex-direction:row !important;flex-wrap:wrap;gap:6px 22px !important;padding:14px 20px 16px !important}\n[data-mq~=\"sidebar\"]>div{flex-direction:row !important;flex-wrap:wrap;gap:2px 4px !important}\n[data-mq~=\"sidebar\"]>div>span{display:none}\n[data-mq~=\"sidebar\"]>div>div{margin:0 !important;white-space:nowrap}\n[data-mq~=\"content\"]{padding:28px 20px 64px !important}\n[data-mq~=\"content\"] h1{font-size:28px !important}\n[data-mq~=\"content\"] h2{font-size:19px !important}\n[data-mq~=\"reflist\"]>div{grid-template-columns:1fr !important;gap:4px !important}\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;display:flex;flex-direction:column\">\n\n  <!-- TOP BAR -->\n  <div data-screen-label=\"Docs top bar\" data-mq=\"topbar\" style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 32px;border-bottom:1px solid #ebe9e2;background:rgba(253,253,251,.95);position:sticky;top:0;z-index:10\">\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <a href=\"index.html\" style=\"display:flex;align-items:center;gap:9px;color:#14201a\">\n        <span style=\"width:20px;height:20px;border-radius:3px 60% 3px 60%;background:#2f9e5f;display:block\"><\u002Fspan>\n        <span style=\"font-weight:700;font-size:16px;letter-spacing:-.02em\">Steckling<\u002Fspan>\n      <\u002Fa>\n      <span style=\"font-size:14px;color:#c2c0b6\">/<\u002Fspan>\n      <span style=\"font-size:14.5px;color:#4a544c;font-weight:600\">Docs<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:22px;font-size:13.5px\">\n      <span onclick=\"{{ openSearch }}\" data-mq=\"searchbox\" style=\"display:flex;align-items:center;gap:8px;border:1px solid #e2dfd4;border-radius:7px;padding:7px 12px;color:#9a9f95;background:#fff;width:220px;font-size:13px;cursor:pointer\" style-hover=\"border-color:#c2bfb2;color:#6a7064\">Search docs… <span data-mq=\"m-hide\" style=\"margin-left:auto;font:500 10.5px 'IBM Plex Mono',monospace;background:#f2f0e9;padding:2px 5px;border-radius:4px;color:#8a8f86\">⌘K<\u002Fspan><\u002Fspan>\n      <a href=\"https://github.com/timd/steckling\" style=\"color:#3d463f\">GitHub ↗<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- SEARCH OVERLAY -->\n  <sc-if value=\"{{ searchOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div data-screen-label=\"Search overlay\" onclick=\"{{ closeSearch }}\" style=\"position:fixed;inset:0;background:rgba(15,23,19,.45);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding:80px 20px 20px\">\n    <div onclick=\"{{ stopClick }}\" style=\"width:100%;max-width:560px;background:#fdfdfb;border-radius:12px;box-shadow:0 30px 80px rgba(12,40,26,.35);overflow:hidden;display:flex;flex-direction:column\">\n      <div style=\"display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid #ebe9e2\">\n        <input value=\"{{ query }}\" onchange=\"{{ onQuery }}\" autofocus=\"{{ true }}\" placeholder=\"Search docs…\" style=\"flex:1;border:none;outline:none;font-size:16px;background:transparent;color:#14201a;font-family:inherit;padding:0\">\n        <span style=\"font:500 10.5px 'IBM Plex Mono',monospace;background:#f2f0e9;padding:3px 6px;border-radius:4px;color:#8a8f86\">esc<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"max-height:380px;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:2px\">\n        <sc-for list=\"{{ results }}\" as=\"r\" hint-placeholder-count=\"4\">\n          <div onclick=\"{{ r.open }}\" onmouseenter=\"{{ r.hover }}\" style=\"{{ r.style }}\">\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px\">\n              <span style=\"font-size:14.5px;font-weight:600;color:#14201a\">{{ r.title }}<\u002Fspan>\n              <span style=\"font:500 10.5px 'IBM Plex Mono',monospace;color:#1c5c3a;background:#e7f3ea;padding:2px 7px;border-radius:99px;white-space:nowrap\">{{ r.tag }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:13px;line-height:1.5;color:#5a6259;margin-top:3px\">{{ r.snippet }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n        <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:26px 14px;text-align:center;font-size:14px;color:#8a8f86\">No matches — try “ports”, “compose”, or a command name<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:16px;padding:9px 18px;border-top:1px solid #ebe9e2;font-size:12px;color:#8a8f86\"><span>↑↓ navigate<\u002Fspan><span>↵ open<\u002Fspan><span>esc close<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div data-mq=\"docswrap\" style=\"display:flex;flex:1;max-width:1200px;margin:0 auto;width:100%\">\n\n    <!-- SIDEBAR -->\n    <div data-screen-label=\"Docs sidebar\" data-mq=\"sidebar\" style=\"width:240px;flex:none;border-right:1px solid #ebe9e2;padding:28px 20px 40px 32px;display:flex;flex-direction:column;gap:24px\">\n      <div style=\"display:flex;flex-direction:column;gap:2px\">\n        <span style=\"font:500 11px 'IBM Plex Mono',monospace;color:#8a8f86;letter-spacing:.08em;margin-bottom:8px\">START HERE<\u002Fspan>\n        <div onclick=\"{{ goConcepts }}\" style=\"{{ sConcepts }}\">Concepts<\u002Fdiv>\n        <div onclick=\"{{ goInstall }}\" style=\"{{ sInstall }}\">Install<\u002Fdiv>\n        <div onclick=\"{{ goQuickstart }}\" style=\"{{ sQuickstart }}\">Quickstart<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:2px\">\n        <span style=\"font:500 11px 'IBM Plex Mono',monospace;color:#8a8f86;letter-spacing:.08em;margin-bottom:8px\">REFERENCE<\u002Fspan>\n        <div onclick=\"{{ goCommands }}\" style=\"{{ sCommands }}\">Commands<\u002Fdiv>\n        <div onclick=\"{{ goConfig }}\" style=\"{{ sConfig }}\">steckling.yml<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:2px\">\n        <span style=\"font:500 11px 'IBM Plex Mono',monospace;color:#8a8f86;letter-spacing:.08em;margin-bottom:8px\">GUIDES<\u002Fspan>\n        <div onclick=\"{{ goMcp }}\" style=\"{{ sMcp }}\">Drive it from Claude (MCP)<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- CONTENT -->\n    <div data-mq=\"content\" style=\"flex:1;min-width:0;padding:40px 56px 80px;max-width:760px\">\n\n      <sc-if value=\"{{ pgConcepts }}\" hint-placeholder-val=\"{{ true }}\">\n      <div data-screen-label=\"Concepts\" style=\"display:flex;flex-direction:column;gap:18px\">\n        <span style=\"font:500 12px 'IBM Plex Mono',monospace;color:#1c5c3a;letter-spacing:.08em\">START HERE<\u002Fspan>\n        <h1 style=\"margin:0;font-size:36px;letter-spacing:-.028em\">Concepts<\u002Fh1>\n        <p style=\"margin:0;font-size:16px;line-height:1.7;color:#4a544c\">The mental model behind Steckling: <strong>a git worktree + an isolated Docker service stack per branch<\u002Fstrong>. Each branch gets its own folder, its own services, its own data, on its own ports. Nothing collides.<\u002Fp>\n        <div style=\"background:#0f1713;border-radius:10px;padding:18px 20px;font:12.5px/1.9 'IBM Plex Mono',monospace;color:#c9d6cc;white-space:pre;overflow-x:auto;scrollbar-color:#2c3b32 transparent\">../myapp-trees/feature-a/   steck up  →  postgres <span style=\"color:#7fd6a3\">:31140<\u002Fspan>   (own data)\n../myapp-trees/feature-b/   steck up  →  postgres <span style=\"color:#7fd6a3\">:44870<\u002Fspan>   (own data)\n       main/                steck up  →  postgres <span style=\"color:#7fd6a3\">:20030<\u002Fspan>\n                            ~/.steckling/registry.json tracks them all<\u002Fdiv>\n        <h2 style=\"margin:14px 0 0;font-size:22px;letter-spacing:-.02em\">Three moving parts<\u002Fh2>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <div style=\"display:flex;gap:14px;align-items:flex-start\"><span style=\"flex:none;width:26px;height:26px;border-radius:7px;background:#e7f3ea;display:grid;place-items:center;font:600 13px 'IBM Plex Mono',monospace;color:#1c5c3a\">1<\u002Fspan><p style=\"margin:0;font-size:15px;line-height:1.65;color:#4a544c\"><strong style=\"color:#14201a\">A folder per branch.<\u002Fstrong> Via <code style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">git worktree<\u002Fcode>, each branch lives in its own directory. Switching branches is switching folders.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex;gap:14px;align-items:flex-start\"><span style=\"flex:none;width:26px;height:26px;border-radius:7px;background:#e7f3ea;display:grid;place-items:center;font:600 13px 'IBM Plex Mono',monospace;color:#1c5c3a\">2<\u002Fspan><p style=\"margin:0;font-size:15px;line-height:1.65;color:#4a544c\"><strong style=\"color:#14201a\">Private services per branch.<\u002Fstrong> A separate <code style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">docker compose<\u002Fcode> project per branch — own containers, own volumes, a free host port Steckling picks for you.<\u002Fp><\u002Fdiv>\n          <div style=\"display:flex;gap:14px;align-items:flex-start\"><span style=\"flex:none;width:26px;height:26px;border-radius:7px;background:#e7f3ea;display:grid;place-items:center;font:600 13px 'IBM Plex Mono',monospace;color:#1c5c3a\">3<\u002Fspan><p style=\"margin:0;font-size:15px;line-height:1.65;color:#4a544c\"><strong style=\"color:#14201a\">Env injection.<\u002Fstrong> Steckling writes the right <code style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">DATABASE_URL<\u002Fcode> (etc.) into a gitignored file your app reads, then runs your normal dev command.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n        <h2 style=\"margin:14px 0 0;font-size:22px;letter-spacing:-.02em\">What Steckling doesn't do<\u002Fh2>\n        <p style=\"margin:0;font-size:15px;line-height:1.7;color:#4a544c\">It's <strong>stack-agnostic<\u002Fstrong>: your app runs natively the way it always has (<code style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">npm run dev<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">rails s<\u002Fcode>, <code style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">go run<\u002Fcode>, …). Steckling only ever deals with git, Docker, and environment variables. It never runs your app for you and knows nothing about your framework. It works for any language that reads its config from the environment.<\u002Fp>\n        <div style=\"display:flex;justify-content:flex-end;margin-top:18px;padding-top:18px;border-top:1px solid #ebe9e2\">\n          <span onclick=\"{{ goInstall }}\" style=\"font-size:14px;font-weight:600;color:#1c5c3a;cursor:pointer\">Next: Install →<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ pgInstall }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Install\" style=\"display:flex;flex-direction:column;gap:18px\">\n        <span style=\"font:500 12px 'IBM Plex Mono',monospace;color:#1c5c3a;letter-spacing:.08em\">START HERE<\u002Fspan>\n        <h1 style=\"margin:0;font-size:36px;letter-spacing:-.028em\">Install<\u002Fh1>\n        <div style=\"background:#f4f8f4;border:1px solid #cbe5d3;border-radius:10px;padding:14px 18px;font-size:14px;line-height:1.6;color:#2a4735\">Requires <strong>git<\u002Fstrong> and <strong>Docker<\u002Fstrong>. The CLI is a single self-contained binary — no runtime to install.<\u002Fdiv>\n        <h2 style=\"margin:10px 0 0;font-size:22px;letter-spacing:-.02em\">Install script<\u002Fh2>\n        <p style=\"margin:0;font-size:15px;line-height:1.7;color:#4a544c\">Downloads a binary to <code style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">~/.local/bin<\u002Fcode>:<\u002Fp>\n        <div style=\"background:#0f1713;border-radius:10px;padding:16px 20px;font:13px/1.8 'IBM Plex Mono',monospace;color:#c9d6cc;white-space:pre-wrap;overflow-wrap:break-word;scrollbar-color:#2c3b32 transparent\"><span style=\"color:#3fae6d;font-weight:600\">$<\u002Fspan> curl -fsSL https://raw.githubusercontent.com/timd/steckling/main/install.sh | sh<\u002Fdiv>\n        <h2 style=\"margin:10px 0 0;font-size:22px;letter-spacing:-.02em\">Homebrew<\u002Fh2>\n        <div style=\"background:#0f1713;border-radius:10px;padding:16px 20px;font:13px/1.8 'IBM Plex Mono',monospace;color:#c9d6cc;white-space:pre-wrap;overflow-wrap:break-word;scrollbar-color:#2c3b32 transparent\"><span style=\"color:#3fae6d;font-weight:600\">$<\u002Fspan> brew install timd/steckling/steckling<\u002Fdiv>\n        <h2 style=\"margin:10px 0 0;font-size:22px;letter-spacing:-.02em\">From source<\u002Fh2>\n        <p style=\"margin:0;font-size:15px;line-height:1.7;color:#4a544c\">The engine is TypeScript on <a href=\"https://bun.sh\">Bun<\u002Fa>:<\u002Fp>\n        <div style=\"background:#0f1713;border-radius:10px;padding:16px 20px;font:13px/1.8 'IBM Plex Mono',monospace;color:#c9d6cc;white-space:pre-wrap;overflow-wrap:break-word;scrollbar-color:#2c3b32 transparent\"><span style=\"color:#3fae6d;font-weight:600\">$<\u002Fspan> bun run engine/src/cli.ts &lt;command&gt;<\u002Fdiv>\n        <h2 style=\"margin:10px 0 0;font-size:22px;letter-spacing:-.02em\">Check your machine<\u002Fh2>\n        <p style=\"margin:0;font-size:15px;line-height:1.7;color:#4a544c\">Verifies git, Docker, and PATH are ready:<\u002Fp>\n        <div style=\"background:#0f1713;border-radius:10px;padding:16px 20px;font:13px/1.8 'IBM Plex Mono',monospace;color:#c9d6cc;white-space:pre-wrap;overflow-wrap:break-word;scrollbar-color:#2c3b32 transparent\"><span style=\"color:#3fae6d;font-weight:600\">$<\u002Fspan> steck doctor<\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;margin-top:18px;padding-top:18px;border-top:1px solid #ebe9e2\">\n          <span onclick=\"{{ goConcepts }}\" style=\"font-size:14px;color:#4a544c;cursor:pointer\">← Concepts<\u002Fspan>\n          <span onclick=\"{{ goQuickstart }}\" style=\"font-size:14px;font-weight:600;color:#1c5c3a;cursor:pointer\">Next: Quickstart →<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ pgQuickstart }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Quickstart\" style=\"display:flex;flex-direction:column;gap:18px\">\n        <span style=\"font:500 12px 'IBM Plex Mono',monospace;color:#1c5c3a;letter-spacing:.08em\">START HERE<\u002Fspan>\n        <h1 style=\"margin:0;font-size:36px;letter-spacing:-.028em\">Quickstart<\u002Fh1>\n        <p style=\"margin:0;font-size:16px;line-height:1.7;color:#4a544c\">Run <code style=\"font-family:'IBM Plex Mono',monospace;font-size:13.5px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">steck init<\u002Fcode> and the wizard writes both files (plus the .gitignore entry) for you — presets for Postgres, MySQL, Redis, Mongo, and RabbitMQ, and your detected run command. Or add the two files by hand — a services compose file and a <code style=\"font-family:'IBM Plex Mono',monospace;font-size:13.5px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">steckling.yml<\u002Fcode>.<\u002Fp>\n        <h2 style=\"margin:10px 0 0;font-size:22px;letter-spacing:-.02em\">1 · steckling.yml<\u002Fh2>\n        <pre style=\"margin:0;background:#0f1713;border-radius:10px;padding:16px 20px;font:12.5px/1.8 'IBM Plex Mono',monospace;color:#c9d6cc;white-space:pre-wrap;overflow-wrap:break-word;scrollbar-color:#2c3b32 transparent\"><span style=\"color:#7fd6a3\">version:<\u002Fspan> 1\n<span style=\"color:#7fd6a3\">services:<\u002Fspan>\n  <span style=\"color:#7fd6a3\">compose:<\u002Fspan> ./compose.steckling.yml\n  <span style=\"color:#7fd6a3\">expose:<\u002Fspan>\n    <span style=\"color:#7fd6a3\">postgres:<\u002Fspan>\n      <span style=\"color:#7fd6a3\">container:<\u002Fspan> 5432\n      <span style=\"color:#7fd6a3\">env:<\u002Fspan> DATABASE_URL\n      <span style=\"color:#7fd6a3\">url:<\u002Fspan> \"postgres://app:app@localhost:{port}/app\"\n<span style=\"color:#7fd6a3\">app:<\u002Fspan>\n  <span style=\"color:#7fd6a3\">run:<\u002Fspan> \"npm run dev\"  <span style=\"color:#5a6e60\"># any language\n<\u002Fspan><span style=\"color:#7fd6a3\">hooks:<\u002Fspan>\n  <span style=\"color:#7fd6a3\">provision:<\u002Fspan> \"npm run migrate &amp;&amp; npm run seed\"<\u002Fpre>\n        <h2 style=\"margin:10px 0 0;font-size:22px;letter-spacing:-.02em\">2 · compose.steckling.yml<\u002Fh2>\n        <pre style=\"margin:0;background:#0f1713;border-radius:10px;padding:16px 20px;font:12.5px/1.8 'IBM Plex Mono',monospace;color:#c9d6cc;white-space:pre-wrap;overflow-wrap:break-word;scrollbar-color:#2c3b32 transparent\"><span style=\"color:#7fd6a3\">services:<\u002Fspan>\n  <span style=\"color:#7fd6a3\">postgres:<\u002Fspan>\n    <span style=\"color:#7fd6a3\">image:<\u002Fspan> postgres:16\n    <span style=\"color:#7fd6a3\">environment:<\u002Fspan>\n      POSTGRES_USER: app\n      POSTGRES_PASSWORD: app\n      POSTGRES_DB: app\n    <span style=\"color:#5a6e60\"># Steckling injects the host port\n<\u002Fspan>    <span style=\"color:#7fd6a3\">ports:<\u002Fspan> [\"${STECKLING_PORT_POSTGRES}:5432\"]\n    <span style=\"color:#7fd6a3\">volumes:<\u002Fspan> [pgdata:/var/lib/postgresql/data]\n<span style=\"color:#7fd6a3\">volumes:<\u002Fspan> { pgdata: {} }<\u002Fpre>\n        <h2 style=\"margin:10px 0 0;font-size:22px;letter-spacing:-.02em\">3 · Run it<\u002Fh2>\n        <pre style=\"margin:0;background:#0f1713;border-radius:10px;padding:16px 20px;font:12.5px/2 'IBM Plex Mono',monospace;color:#c9d6cc;white-space:pre-wrap;overflow-wrap:break-word;scrollbar-color:#2c3b32 transparent\"><span style=\"color:#3fae6d;font-weight:600\">$<\u002Fspan> steck up               <span style=\"color:#5a6e60\"># start this branch: services + provision + run the app<\u002Fspan>\n<span style=\"color:#3fae6d;font-weight:600\">$<\u002Fspan> steck new feature/x    <span style=\"color:#5a6e60\"># a second branch, in its own folder…<\u002Fspan>\n<span style=\"color:#3fae6d;font-weight:600\">$<\u002Fspan> cd ../myapp-trees/feature/x\n<span style=\"color:#3fae6d;font-weight:600\">$<\u002Fspan> steck up               <span style=\"color:#5a6e60\"># …with its own DB, running in parallel<\u002Fspan>\n<span style=\"color:#3fae6d;font-weight:600\">$<\u002Fspan> steck list             <span style=\"color:#5a6e60\"># see every worktree, its status + ports<\u002Fspan><\u002Fpre>\n        <div style=\"background:#f8f7f2;border:1px solid #e5e2d7;border-radius:10px;padding:14px 18px;font-size:14px;line-height:1.6;color:#4a544c\">Already have a project? See <strong>Adopting an existing project<\u002Fstrong> in the repo docs for adding Steckling to an app with an existing database setup.<\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;margin-top:18px;padding-top:18px;border-top:1px solid #ebe9e2\">\n          <span onclick=\"{{ goInstall }}\" style=\"font-size:14px;color:#4a544c;cursor:pointer\">← Install<\u002Fspan>\n          <span onclick=\"{{ goCommands }}\" style=\"font-size:14px;font-weight:600;color:#1c5c3a;cursor:pointer\">Next: Commands →<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ pgCommands }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Commands\" style=\"display:flex;flex-direction:column;gap:18px\">\n        <span style=\"font:500 12px 'IBM Plex Mono',monospace;color:#1c5c3a;letter-spacing:.08em\">REFERENCE<\u002Fspan>\n        <h1 style=\"margin:0;font-size:36px;letter-spacing:-.028em\">Commands<\u002Fh1>\n        <p style=\"margin:0;font-size:16px;line-height:1.7;color:#4a544c\">Everything the <code style=\"font-family:'IBM Plex Mono',monospace;font-size:13.5px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">steck<\u002Fcode> CLI can do.<\u002Fp>\n        <div data-mq=\"reflist\" style=\"display:flex;flex-direction:column\">\n          <div style=\"display:grid;grid-template-columns:240px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steck init<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Set up a repo interactively — service presets, detected run command, both config files written for you<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:240px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steck new &lt;branch&gt; [base]<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Create a worktree + allocate its service ports<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:240px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steck up [--no-run]<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Bring up services, provision on first boot, run the app<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:240px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steck down<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Stop the containers, keep the data<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:240px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steck list / status<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">What's registered, running, and on which ports<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:240px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steck exec -- &lt;cmd&gt;<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Run a command wired to this branch's env (e.g. <code style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">sh -c 'psql \"$DATABASE_URL\"'<\u002Fcode>)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:240px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steck rm / prune<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Reclaim a branch's stack / bulk-reclaim merged branches (--purge: folder + branch too)<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:240px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steck deploy [--dry-run]<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Ship this branch's agent to Railway<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:240px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steck logs / destroy<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Tail or tear down the deployed agent<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:240px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steck mcp<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Run the MCP server so Claude can drive the fleet<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:240px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steck doctor / config<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Check the environment / validate <code style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">steckling.yml<\u002Fcode><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;margin-top:18px;padding-top:18px;border-top:1px solid #ebe9e2\">\n          <span onclick=\"{{ goQuickstart }}\" style=\"font-size:14px;color:#4a544c;cursor:pointer\">← Quickstart<\u002Fspan>\n          <span onclick=\"{{ goConfig }}\" style=\"font-size:14px;font-weight:600;color:#1c5c3a;cursor:pointer\">Next: steckling.yml →<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ pgConfig }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"Config reference\" style=\"display:flex;flex-direction:column;gap:18px\">\n        <span style=\"font:500 12px 'IBM Plex Mono',monospace;color:#1c5c3a;letter-spacing:.08em\">REFERENCE<\u002Fspan>\n        <h1 style=\"margin:0;font-size:36px;letter-spacing:-.028em\">steckling.yml<\u002Fh1>\n        <p style=\"margin:0;font-size:16px;line-height:1.7;color:#4a544c\">The single config file Steckling reads from your repo root. Validate it any time with <code style=\"font-family:'IBM Plex Mono',monospace;font-size:13.5px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">steck config<\u002Fcode>.<\u002Fp>\n        <pre style=\"margin:0;background:#0f1713;border-radius:10px;padding:16px 20px;font:12.5px/1.8 'IBM Plex Mono',monospace;color:#c9d6cc;white-space:pre-wrap;overflow-wrap:break-word;scrollbar-color:#2c3b32 transparent\"><span style=\"color:#7fd6a3\">version:<\u002Fspan> 1\n<span style=\"color:#7fd6a3\">services:<\u002Fspan>\n  <span style=\"color:#7fd6a3\">compose:<\u002Fspan> ./compose.steckling.yml\n  <span style=\"color:#7fd6a3\">expose:<\u002Fspan>\n    <span style=\"color:#7fd6a3\">postgres:<\u002Fspan>\n      <span style=\"color:#7fd6a3\">container:<\u002Fspan> 5432\n      <span style=\"color:#7fd6a3\">env:<\u002Fspan> DATABASE_URL\n      <span style=\"color:#7fd6a3\">url:<\u002Fspan> \"postgres://app:app@localhost:{port}/app\"\n<span style=\"color:#7fd6a3\">app:<\u002Fspan>\n  <span style=\"color:#7fd6a3\">run:<\u002Fspan> \"npm run dev\"\n<span style=\"color:#7fd6a3\">hooks:<\u002Fspan>\n  <span style=\"color:#7fd6a3\">provision:<\u002Fspan> \"npm run migrate &amp;&amp; npm run seed\"<\u002Fpre>\n        <div data-mq=\"reflist\" style=\"display:flex;flex-direction:column\">\n          <div style=\"display:grid;grid-template-columns:200px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">version<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Config schema version. Currently <code style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">1<\u002Fcode>.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:200px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">services.compose<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Path to the compose file describing this repo's services. Run per-branch as an isolated compose project.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:200px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">services.expose<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Per service: the <code style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">container<\u002Fcode> port to map, the <code style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">env<\u002Fcode> variable to write, and a <code style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">url<\u002Fcode> template — <code style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">{port}<\u002Fcode> is replaced with the branch's allocated host port.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:200px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">app.run<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Your normal dev command. Steckling runs it with the branch's env injected — any language.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:200px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">hooks.provision<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Runs once on a branch's first <code style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">steck up<\u002Fcode> — migrations, seeds, anything that prepares fresh services.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;margin-top:18px;padding-top:18px;border-top:1px solid #ebe9e2\">\n          <span onclick=\"{{ goCommands }}\" style=\"font-size:14px;color:#4a544c;cursor:pointer\">← Commands<\u002Fspan>\n          <span onclick=\"{{ goMcp }}\" style=\"font-size:14px;font-weight:600;color:#1c5c3a;cursor:pointer\">Next: MCP →<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ pgMcp }}\" hint-placeholder-val=\"{{ false }}\">\n      <div data-screen-label=\"MCP\" style=\"display:flex;flex-direction:column;gap:18px\">\n        <span style=\"font:500 12px 'IBM Plex Mono',monospace;color:#1c5c3a;letter-spacing:.08em\">GUIDES<\u002Fspan>\n        <h1 style=\"margin:0;font-size:36px;letter-spacing:-.028em\">Drive it from Claude (MCP)<\u002Fh1>\n        <p style=\"margin:0;font-size:16px;line-height:1.7;color:#4a544c\"><code style=\"font-family:'IBM Plex Mono',monospace;font-size:13.5px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">steck mcp<\u002Fcode> runs an MCP server that exposes the fleet to AI agents. Because branches are fully isolated, you can point a separate Claude session at each one and let them work in parallel.<\u002Fp>\n        <h2 style=\"margin:10px 0 0;font-size:22px;letter-spacing:-.02em\">Register with Claude Code<\u002Fh2>\n        <div style=\"background:#0f1713;border-radius:10px;padding:16px 20px;font:13px/1.8 'IBM Plex Mono',monospace;color:#c9d6cc;white-space:pre-wrap;overflow-wrap:break-word;scrollbar-color:#2c3b32 transparent\"><span style=\"color:#3fae6d;font-weight:600\">$<\u002Fspan> claude mcp add steckling -- steck mcp<\u002Fdiv>\n        <h2 style=\"margin:10px 0 0;font-size:22px;letter-spacing:-.02em\">Tools<\u002Fh2>\n        <div data-mq=\"reflist\" style=\"display:flex;flex-direction:column\">\n          <div style=\"display:grid;grid-template-columns:200px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steckling_new<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Create a worktree + stack for a branch<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:200px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steckling_up<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Bring a branch's services up and provision<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:200px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steckling_list<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">Inspect every registered worktree, status + ports<\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:200px 1fr;gap:20px;padding:14px 2px;border-bottom:1px solid #ebe9e2\"><code style=\"font:600 13.5px 'IBM Plex Mono',monospace\">steckling://registry<\u002Fcode><span style=\"font-size:14px;line-height:1.6;color:#4a544c\">A live resource — the registry of all branches, as MCP context<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <h2 style=\"margin:10px 0 0;font-size:22px;letter-spacing:-.02em\">Why this works<\u002Fh2>\n        <p style=\"margin:0;font-size:15px;line-height:1.7;color:#4a544c\">Each agent session gets a branch whose database, ports, and data belong to it alone. Agents can migrate, seed, and break things freely — nothing they do leaks into your branch or another agent's. When a branch is merged, <code style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">steck prune<\u002Fcode> reclaims the whole stack; add <code style=\"font-family:'IBM Plex Mono',monospace;font-size:13px;background:#f2f0e9;padding:1px 5px;border-radius:4px\">--purge<\u002Fcode> to remove the worktree folder and branch too.<\u002Fp>\n        <div style=\"display:flex;justify-content:flex-start;margin-top:18px;padding-top:18px;border-top:1px solid #ebe9e2\">\n          <span onclick=\"{{ goConfig }}\" style=\"font-size:14px;color:#4a544c;cursor:pointer\">← steckling.yml<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { page: \"concepts\", searchOpen: false, query: \"\", sel: 0 };\n\n  pages = [\"concepts\", \"install\", \"quickstart\", \"commands\", \"config\", \"mcp\"];\n\n  index = [\n    { page: \"concepts\", tag: \"Concepts\", t: \"Concepts\", s: \"The mental model: a git worktree + an isolated Docker service stack per branch.\", k: \"overview mental model isolation branch folder worktree docker\" },\n    { page: \"install\", tag: \"Install\", t: \"Install\", s: \"Install script, Homebrew, or from source. Requires git and Docker.\", k: \"brew curl install.sh binary macos linux setup download\" },\n    { page: \"quickstart\", tag: \"Quickstart\", t: \"Quickstart\", s: \"Add two files to your repo: steckling.yml and a services compose file.\", k: \"getting started setup tutorial add integrate compose\" },\n    { page: \"commands\", tag: \"Commands\", t: \"Commands\", s: \"Everything the steck CLI can do.\", k: \"cli reference\" },\n    { page: \"config\", tag: \"Reference\", t: \"steckling.yml\", s: \"The single config file Steckling reads from your repo root.\", k: \"config configuration yaml schema validate steck config\" },\n    { page: \"mcp\", tag: \"MCP\", t: \"Drive it from Claude (MCP)\", s: \"steck mcp exposes the fleet to AI agents as tools plus a live registry resource.\", k: \"ai agents claude code server register parallel\" },\n    { page: \"concepts\", tag: \"Concepts\", t: \"Three moving parts\", s: \"A folder per branch, private services per branch, env injection.\", k: \"worktree compose environment database_url\" },\n    { page: \"concepts\", tag: \"Concepts\", t: \"What Steckling doesn't do\", s: \"Stack-agnostic — your app runs natively; only git, Docker, and env vars.\", k: \"framework language agnostic native npm rails go\" },\n    { page: \"install\", tag: \"Install\", t: \"steck doctor\", s: \"Verifies git, Docker, and PATH are ready.\", k: \"check requirements environment troubleshoot\" },\n    { page: \"commands\", tag: \"Commands\", t: \"steck init\", s: \"Interactive setup wizard — presets, detection, writes steckling.yml and compose.steckling.yml.\", k: \"init setup wizard bootstrap scaffold generate config\" },\n    { page: \"commands\", tag: \"Commands\", t: \"steck new\", s: \"Create a worktree + allocate its service ports.\", k: \"branch create worktree base\" },\n    { page: \"commands\", tag: \"Commands\", t: \"steck up / down\", s: \"Services up, provision on first boot, run the app — or stop and keep data.\", k: \"start stop run boot containers no-run\" },\n    { page: \"commands\", tag: \"Commands\", t: \"steck list / status\", s: \"What's registered, running, and on which ports.\", k: \"ports registry running worktrees\" },\n    { page: \"commands\", tag: \"Commands\", t: \"steck exec\", s: \"Run a command wired to this branch's env, e.g. sh -c 'psql \\\"$DATABASE_URL\\\"'.\", k: \"shell psql environment run command\" },\n    { page: \"commands\", tag: \"Commands\", t: \"steck rm / prune\", s: \"Reclaim a branch's stack, or bulk-reclaim merged branches; --purge also removes the worktree folder and git branch.\", k: \"delete remove cleanup merged reclaim volumes purge\" },\n    { page: \"commands\", tag: \"Commands\", t: \"steck deploy / logs / destroy\", s: \"Ship this branch's agent to Railway; tail or tear it down.\", k: \"railway deployment production ship dry-run\" },\n    { page: \"config\", tag: \"Reference\", t: \"services.expose\", s: \"Per service: container port, env var to write, and a url template with {port}.\", k: \"ports mapping database_url postgres allocate expose\" },\n    { page: \"config\", tag: \"Reference\", t: \"app.run\", s: \"Your normal dev command, run with the branch's env injected.\", k: \"dev server npm run command\" },\n    { page: \"config\", tag: \"Reference\", t: \"hooks.provision\", s: \"Runs once on a branch's first steck up — migrations, seeds.\", k: \"migrate seed first boot setup database hooks\" },\n    { page: \"mcp\", tag: \"MCP\", t: \"Register with Claude Code\", s: \"claude mcp add steckling -- steck mcp\", k: \"install add server claude code mcp\" },\n    { page: \"mcp\", tag: \"MCP\", t: \"steckling://registry\", s: \"A live resource — the registry of all branches as MCP context.\", k: \"resource tools steckling_new steckling_up steckling_list\" }\n  ];\n\n  componentDidMount() {\n    const h = (location.hash || \"\").replace(\"#\", \"\");\n    if (this.pages.includes(h) && h !== this.state.page) this.setState({ page: h });\n    this.onKey = (e) => {\n      if ((e.metaKey || e.ctrlKey) && String(e.key).toLowerCase() === \"k\") {\n        e.preventDefault();\n        this.setState(s => ({ searchOpen: !s.searchOpen, query: \"\", sel: 0 }));\n        return;\n      }\n      if (!this.state.searchOpen) return;\n      if (e.key === \"Escape\") this.setState({ searchOpen: false });\n      else if (e.key === \"ArrowDown\") { e.preventDefault(); this.setState(s => ({ sel: Math.min(s.sel + 1, Math.max(this.filtered().length - 1, 0)) })); }\n      else if (e.key === \"ArrowUp\") { e.preventDefault(); this.setState(s => ({ sel: Math.max(s.sel - 1, 0) })); }\n      else if (e.key === \"Enter\") { const r = this.filtered()[this.state.sel]; if (r) this.openResult(r); }\n    };\n    window.addEventListener(\"keydown\", this.onKey);\n  }\n\n  componentWillUnmount() { window.removeEventListener(\"keydown\", this.onKey); }\n\n  filtered() {\n    const q = this.state.query.trim().toLowerCase();\n    if (!q) return this.index.slice(0, 8);\n    const words = q.split(/\\s+/);\n    return this.index\n      .map(e => {\n        const hay = (e.t + \" \" + e.k + \" \" + e.s).toLowerCase();\n        let score = 0;\n        for (const w of words) {\n          if (!hay.includes(w)) return null;\n          score += e.t.toLowerCase().includes(w) ? 2 : 1;\n        }\n        return { e, score };\n      })\n      .filter(Boolean)\n      .sort((a, b) => b.score - a.score)\n      .map(x => x.e)\n      .slice(0, 8);\n  }\n\n  openResult(e) {\n    this.go(e.page);\n    this.setState({ searchOpen: false, query: \"\", sel: 0 });\n  }\n\n  go(id) {\n    this.setState({ page: id });\n    try { history.replaceState(null, \"\", \"#\" + id); } catch (e) {}\n  }\n\n  itemStyle(active) {\n    return {\n      padding: \"7px 10px\",\n      margin: \"0 0 2px -10px\",\n      borderRadius: \"6px\",\n      fontSize: \"14px\",\n      lineHeight: \"1.35\",\n      cursor: \"pointer\",\n      color: active ? \"#1c5c3a\" : \"#4a544c\",\n      fontWeight: active ? 600 : 400,\n      background: active ? \"#e7f3ea\" : \"transparent\"\n    };\n  }\n\n  renderVals() {\n    const p = this.state.page;\n    const vals = {};\n    for (const id of this.pages) {\n      const cap = id.charAt(0).toUpperCase() + id.slice(1);\n      vals[\"pg\" + cap] = p === id;\n      vals[\"go\" + cap] = () => this.go(id);\n      vals[\"s\" + cap] = this.itemStyle(p === id);\n    }\n    const st = this.state;\n    vals.searchOpen = st.searchOpen;\n    vals.query = st.query;\n    vals.openSearch = () => this.setState({ searchOpen: true, query: \"\", sel: 0 });\n    vals.closeSearch = () => this.setState({ searchOpen: false });\n    vals.stopClick = (ev) => ev.stopPropagation();\n    vals.onQuery = (ev) => this.setState({ query: ev.target.value, sel: 0 });\n    const list = this.filtered();\n    vals.results = list.map((e, i) => ({\n      title: e.t,\n      snippet: e.s,\n      tag: e.tag,\n      open: () => this.openResult(e),\n      hover: () => this.setState({ sel: i }),\n      style: {\n        padding: \"10px 12px\",\n        borderRadius: \"8px\",\n        cursor: \"pointer\",\n        background: i === st.sel ? \"#e7f3ea\" : \"transparent\"\n      }\n    }));\n    vals.noResults = list.length === 0;\n    return vals;\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
